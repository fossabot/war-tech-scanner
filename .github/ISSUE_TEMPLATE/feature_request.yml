name: "✨ Feature Request"
description: Suggest an improvement or new feature
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Describe what you would like to see in the project.

  - type: textarea
    id: problem
    attributes:
      label: Problem or need
      description: What problem would this feature solve?
      placeholder: "When I analyze an EAR with X, I can't Y..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you imagine it should work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Is there a way to do this today? Why isn't it enough?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Technology detection
        - Migration hints (CompatibilityAdvisor)
        - MTA command suggestion
        - Output / report
        - Performance
        - Documentation
        - Other
    validations:
      required: true
