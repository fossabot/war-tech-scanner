name: "🐛 Bug Report"
description: Report incorrect or unexpected behavior
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Fill in the fields below to speed up the fix.

  - type: input
    id: version
    attributes:
      label: war-tech-scanner version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: input
    id: java
    attributes:
      label: Java version
      placeholder: "e.g. OpenJDK 21.0.3"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. macOS 14.5 / Ubuntu 24.04"
    validations:
      required: true

  - type: input
    id: artifact_type
    attributes:
      label: Analyzed artifact type
      placeholder: "e.g. EAR, WAR, JAR"
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command executed
      render: bash
      placeholder: |
        java -jar war-tech-scanner-0.1.0.jar my-app.ear --target-eap=8.1 --json
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Observed behavior
      description: Paste the full output (including errors)
      render: text
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any extra information that could help (stack trace, logs, etc.)
